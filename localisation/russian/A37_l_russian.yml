 MP_annex_all_desc:"Колумбия, Перу, Боливия, Эквадор, Парагвай, Эфиопия, Сомали, Тибет и Бутан объединяются в новое государство A37 (дух 'Чёрная среда', закрытая экономика, вся промышленность уничтожена). Марокко и Либерия отходят Франции в Алжире. Гаити, Доминикана и Куба — Вест-Индской федерации. Литва — Польше. Белоруссия — Украине. Все земли становятся национальными территориями получателя. Доступно только хосту."
