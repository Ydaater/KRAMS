 ausgleich_events.345.t: "Hungarian Victory in the Crisis on the Danube"
 ausgleich_events.345.d: "It has become increasingly clear, with both the Armee-Oberkommando (Army High Command) and the Foreign Ministry in panic, that the war with our upstart crownland Hungary has taken a turn for the worse. With the core of the monarchy threatened, even the once-confident AOK is fearing for the worst and that not only is the territorial integrity of the Empire no longer salvageable, but that it may already be at the doorstep of complete collapse. To save face and prevent this potential collapse, it has been suggested to the Emperor-King that we must sue for peace or face the dismantlement of the Habsburg Monarchy altogether."
 ausgleich_events.345.a: "We have no choice but to accept the Hungarians privileged status within the empire."
 ausgleich_events.345.b: "There will be no negotiations with the Magyars!"
 ausgleich_events.346.t: "Austria Sues For Peace"
 ausgleich_events.346.d: "The tyrannical Habsburg Monarchy's troops who previously threatened to dismantle our country have been beaten on the field by our glorious armies. Seeing the writing on the wall, [AUS.GetNameDef] has sued for peace. They are willing to accept Hungary's rightfully earned position in the empire, cede our claims in Croatia, and guarantee to never threaten our status ever again. It is clear they are desperate to salvage what is left of the empire. With our position protected, there is little reason to refuse this generous offer even if the prospect of marching through Vienna's Heldenplatz and finishing off the dying corpse of an Empire is indeed tempting."
 ausgleich_events.346.a: "We agree to their terms."
 ausgleich_events.346.b: "No, we shall end the Habsburgs once and for all!"
 ausgleich_events.701.b: "Excellent.\n(Disband divisions)"
 ausgleich_events.9010.t: "[BPL.GetNameDefCap] Declares war on [AUS.GetNameDefCap]"
 ausgleich_events.9010.d: "The ambitions of the Belgrade Pact to regain their rightful lands at Austria's expense are no secret, and with the entrance of the Belgrade Pact's leader into the war we are now presented with our opportunity to end Vienna's hegemony over the Balkans once and for all. This may be challenging the Austrians sooner than we had otherwise planned, but if we believe we have chance, now is the time we must strike."
 ausgleich_events.9010.a: "This is our chance! To war!"
 ausgleich_events.9010.b: "Austria is too strong..."
 ausgleich_events.9011.t: "[SER.GetNameDefCap] Declares war on [CRO.GetName]"
 ausgleich_events.9011.d: "The ambitions of the Belgrade Pact to regain lands at Austria's expense are no secret, and with [SER.GetNameDef]'s' declaration of war on [CRO.GetName] we are now presented with our opportunity to end Vienna's hegemony over the Balkans once and for all."
 ausgleich_events.9011.a: "This is our chance! To war!"
 ausgleich_events.9011.b: "On second thought..."
 ausgleich_events.918.d.bulgaria: "Shocking news from Vienna! The Austro-Hungarian Empire, once the hegemon of the Balkans, has now collapsed into anarchy, its Emperor overthrown in ignominy. This chaotic state of affairs has led to a mutiny in the k.u.k. Army; much of the Imperial Army has defected to the newly independent Hungary.\n\nAustria itself is in a precarious state. With the Phoenix's influence in the Balkans now over, the balance of power has shifted. Bulgaria nows stands as the sole hegemon of the Balkans, for the foreseeable future."
 ausgleich_events.918.d.crownlands: "Shocking news from Vienna! The Austro-Hungarian Empire, once the hegemon of the Balkans, has now collapsed into anarchy, its Emperor overthrown in ignominy. This chaotic state of affairs has led to a mutiny in the k.u.k. Army; much of the Imperial Army has defected to the newly independent Hungary.\n\nAustria itself is in a precarious state. With the Phoenix's influence in the Balkans now over and no clear winner in the Balkans, the already fragile balance of power has been shattered completely, and the future of the region is more uncertain than ever."
