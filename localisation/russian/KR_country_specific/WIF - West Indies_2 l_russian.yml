 west_indies_federation_politics_events.2.t: "Labour Strikes in Guadeloupe"
 west_indies_federation_politics_events.2.d: "Guadeloupe has always been a hot spot for socialists, even while under French rule, with the majority of the population being left-leaning. The island's recent peace ended today when the recent trend of labour strikes in the British colonies finally spread to the French.\n\nOver two thousand farmers have gone on strike for unfair working conditions and extremely high unemployment rates on the island. There is great worry about this strike growing beyond Guadeloupe itself and becoming something bigger, so the problem will need to be dealt with soon."
 west_indies_federation_politics_events.2.a: "Arrange a meeting in a week's time"
 west_indies_federation_politics_events.2.b: "Let them protest"
 west_indies_federation_politics_events.3.t: "Meeting in Basse-Terre"
 west_indies_federation_politics_events.3.d: "Today the Governor-General has met with the French protestors along with a translator to try and appease the farmers in Guadeloupe. Although the language gap was hard to breach at first, the farmers' demands have eventually become apparent. They want to dramatically improve working conditions in both the British and French colonies within one and a half years. These terms are seen as difficult to meet, mainly due to the lack of clarity, but with the meeting already over we're left with a choice."
 west_indies_federation_politics_events.3.a: "We'll try our best"
 west_indies_federation_politics_events.3.b: "Sorry, lay down clearer terms next time"
 west_indies_federation_politics_events.4.t: "Reverberations from Black Monday"
 west_indies_federation_politics_events.4.d: "Our economy has slowly been escaping American reliance since the United Fruit Company merged with the Boston Fruit Company, but complete escape was impossible even with self-rule of the West Indies. This has come to bite us in the back as a consequence of Black Monday. The Great Depression worsening in the United States has hit us and our poor populace hard, and our already small economy has been thrown into even more chaos. Not only that, but the recent Labour Strike Movement might see an increase in activity as well as a result."
 west_indies_federation_politics_events.4.a: "Our world is shattered"
 west_indies_federation_politics_events.5.t: "Jamaican Protests"
 west_indies_federation_politics_events.5.d: "Protests have begun today in Jamaica, complaining about the slowing down of Jamaican development. While the island was traditionally stable before the decade began, Jamaican protests have become a common occurrence, especially compared to some of the other British islands, for many reasons. Economic development has completely halted, though they fund about 42% of the federation, with Guyana and Trinidad & Tobago being the next up in funding. The people grow tired of the lack of development, degrading social standards, cemented rule of governors, and the plantation system still being in use within much of the Federation. While this protest was rather minor compared to others in the past, people fear the steeper economic decline could worsen the political situation of the Federation, and make occurrences like this much more frequent and probably larger."
 west_indies_federation_politics_events.5.a: "It's always the Jamaicans"
 west_indies_federation_politics_events.6.t: "The Moyne Commission"
 west_indies_federation_politics_events.6.d: "With the recently degraded state of the West Indies' economy causing an organised labour movement within the region, this has been a cause for some concern on our part. The Canadian people have always felt close to those within the West Indies Federation, due to a similar upbringing from colony to a British-led federation, increasing their desire for a formalised search into the region and its problems. This has resulted in the formation of the Moyne Commission, expected to go around to each colony within the federation and see exactly what their problems are, starting in the colony of Guiana. The officials in charge of this are Walter Guinness, 1st Baron Moyne as the lead, Dr. Mary Blacklock who works in tropical medicine, Professor F. Engledow who has expertise in agriculture, economist Hubert Henderson, Sir Percy MacKinnon who is representing Canadian financial interests, female liberal politician Cora Taylor Casselman, noted anti-socialist trade unionist Walter Citrine, 1st Baron Citrine, and finally conservative politician Ralph Assheton. Together their objective is to investigate the problems in the West Indies, starting a week from now."
 west_indies_federation_politics_events.6.a: "Let's hope our worry is unfounded"
 west_indies_federation_politics_events.7.t: "The Moyne Commission"
 west_indies_federation_politics_events.7.d: "With the recently degraded state within our country and the many labour strikes plaguing the nation, the Canadian government has decided to send a commission to investigate the situation within our country. This has resulted in the formation of the Moyne Commission, instructed to go around to each colony within the Federation and see exactly what their problems are, starting in the colony of Guiana. The officials in charge of this are Walter Guinness, 1st Baron Moyne as lead, Dr. Mary Blacklock, who works in tropical medicine, Professor F. Engledow, who has expertise in agriculture, economist Hubert Henderson, Sir Percy MacKinnon who is representing Canadian financial interests, female liberal politician Cora Taylor Casselman, noted anti-socialist trade unionist Walter Citrine, 1st Baron Citrine, and finally conservative politician Ralph Assheton. Together their objective is to investigate the problems in the West Indies. They have already embarked for the Caribbean, and they plan to begin a week from now."
 west_indies_federation_politics_events.7.a: "We'll be sure not to disappoint"
 west_indies_federation_politics_events.8.t: "The Moyne Commission Surveys Guiana"
 west_indies_federation_politics_events.8.d: "At their starting place, the Moyne Commission heard many testaments - from the everyday person to the small but slowly increasing trade unions within the region. The main conflict within Guiana has been a very steep divide between Afro- and Indo-Guianese people, with the Afro-Guianese being much more European in mindset and politically active while Indo-Guianese have little to no representation within their region, remaining seen as the lower class of the nation. Afro-Guianese also have better paying jobs, mostly in bauxite mining, while the Indo-Guianese remain traditionally rice farmers.\n\nThe suggestions from the commission have ranged from Sir Percy Mackinnon advising us to attempt to 'civilise' the Indo-Guianese to others like Walter Citrine, who recommends the promotion of non-socialist trade unions as both a counter to the current organised labour movements as well as an aid to regional prosperity."
 west_indies_federation_politics_events.8.a: "Not the best start for us"
 west_indies_federation_politics_events.9.t: "The Moyne Commission Surveys Trinidad & Tobago"
 west_indies_federation_politics_events.9.d: "Previously visited by the Forrester Commission back in 1934 due to its notably high amount of unrest, the Moyne Commission has begun to survey Trinidad & Tobago. Most of what was reported by the people and the Civil Service Association was what was already known before, with the higher class rice plantation owners constantly cracking down on attempts for the workers to gain self-sufficiency, along with problems maintaining its oil holds. The rich amount of oil located in Trinidad & Tobago often spills into the already terrible rice fields, making the process all the harder.\n\nThe recommendations were the same as from the Forrester Commission, with the cracking down of the higher sugar classes on the workers rights from Walter Guinness himself, with others like F. Engledow wanting to see oil production organised to help the people have an easier time producing the rice which the colony feeds itself with."
 west_indies_federation_politics_events.9.a: "Is it really as bad as the last time?"
 west_indies_federation_politics_events.11.t: "The Moyne Commission Surveys the Minor Islands"
 west_indies_federation_politics_events.11.d: "The surveying of the minor islands was significantly easier according to Percy Mackinnon, as many of the problems were much of the same. The sugar farmers are constantly cracked down upon, with small trade unions growing all over. However, among the islands one stood out, Barbados. Barbadians were very fervent about the way they are stomped down upon, and the need to help the trade union movement in order for these islands to further develop to reduce the insane reliance on the 'Big Three'(Trinidad & Tobago, Jamaica, and British Guiana). Some other things of note were the large amount of women in the workforce, leaving many men without jobs, feeding the unemployment within the many islands.\n\nAn incident occurred during this surveying, with Walter Citrine disappearing for a day, apparently going around and showing extreme sympathy for the Barbadians, providing scholarships and very large donations to these fledgling trade unions. He was quickly reined in, but his actions already had their effects, with Barbadians growing more resistant to our government. Despite the incident, the Commission suggests we look into the standards of living in these sugar plantations, and to encourage women to return home to manage the families in order to secure more positions in jobs for men."
 west_indies_federation_politics_events.11.a: "Barbados sure is rowdy..."
 west_indies_federation_politics_events.12.t: "The Moyne Commission Surveys the French Colonies"
 west_indies_federation_politics_events.12.d: "The surveying of the French colonies was a bit more unique in a sense, as a translator was required for the meetings to actually work. The survey process was slow and chaotic, but it has at long last been completed. Conditions on the French islands were similar to British areas, but with fewer plantation issues and more... starvation. Hunger riots have begun to plague the French colonies, as they struggle to get the food they need with people starving on the streets. Many blame this on higher population density of islands like Guadeloupe and Martinique compared to the others, making jobs harder to find especially without the French government available to supply food on demand for the islands when these problems occur. Recommendations have ranged from promoting the development of the islands to ensure more people have jobs in order to feed their families from Hubert Henderson, while F. Engledow wants to increase the amount of government-owned plantations in order to ensure people get the jobs they need so that they can feed themselves and their families. Some others have also recommended that we ask the French for help in feeding these colonies, but it is very doubtful whether they'd even accept such an offer."
 west_indies_federation_politics_events.12.a: "This is truly embarrassing"
 west_indies_federation_politics_events.13.t: "The Moyne Commission Surveys Jamaica"
 west_indies_federation_politics_events.13.d: "What was 'long awaited' by the commission is the most prosperous but also most chaotic of the colonies. Right off the bat, the people furiously protested the plantation economy within the region, with it being a very similar situation to the other colonies, with a richer class forcing the lower to work for a very low wage. This problem was even worse in Jamaica, with its high population density making finding these jobs a much more desperate endeavour, resulting in others searching for... alternative forms of making money. Sponsored by the United Fruit Company itself, people are encouraged to come to Jamaica for 'Summer pleasures with the women' just for the women to be able to scrape by. The rest is a really bad combination of almost everything else, leaving Jamaica to be one of the most profitable but internally undesirable of all the colonies.\n\nWalter Citrine has directly approached representatives of trade unions in Jamaica in order to donate and expand them as an early measure, but many things will need to be done regarding the colony. Possible solutions include reforming the plantation system, opening up more jobs to remove the prostitution problem, and developing other islands to reduce the reliance many have on Jamaica within the federation."
 west_indies_federation_politics_events.13.a: "Our jewel is never calm"
 west_indies_federation_politics_events.14.t: "The Moyne Commission Surveys Bermuda and the Bahamas"
 west_indies_federation_politics_events.14.d: "Bermuda and the Bahamas have always been significantly more stable than the other islands, seeing relative improvement overall. The surveying of the Bahamas noted divides between rich white plantation owners and the black working class, but it is seen as a much more mitigative problem compared to the other colonies, while Bermuda has been more prosperous than it has been for a while now. It has begun to develop a booming tourism industry, with the industry on Bermuda slowly expanding as a result.\n\nNot much has to be done regarding Bermuda, with the Bahamas needing the same treatment as the other colonies, with the need to help the lower class to grow in self sufficiency in order to be able to slowly remove the outdated plantation system."
 west_indies_federation_politics_events.14.a: "A calm in the storm"
 west_indies_federation_politics_events.15.t: "The Commission Returns to Canada"
 west_indies_federation_politics_events.15.d: "The commission officially returned to Canada today, having seen all they wanted to see. We have received a large variety of suggestions from the multitude of people, but it can be summed up as:\n\n1. Move women from the factories to the household, in order to secure jobs for the men so they can earn a living for themselves and their families.\n\n2. Hold checks across the many plantations, ensuring that health standards are kept in check, while also making sure the people are able to work within them in a humane manner.\n\n3. Help to build an education system within the West Indies, in order to ensure the slow gain in self-sufficiency as people grow more knowledgeable, with the end goal of eventually abolishing the plantation system in favour of a modern economy.\n\nAs a more personal suggestion from Walter Citrine, he recommends the slowly birthing West Indies trade unions forge together the beginnings of a new way of life for the region in the form of non-socialist trade unions. As a final suggestion that lies more on their shoulders, they will request overtime funding from the Canadian government to help the development of the West Indies, although it is unknown whether the Canadian government will accept such a deal. For now all we can do is try and implement some of their suggestions before the report is officially released, to prevent as much backlash as possible."
 west_indies_federation_politics_events.15.a: "We'll try our best..."
 west_indies_federation_politics_events.16.t: "The Moyne Commission Returns"
 west_indies_federation_politics_events.16.d: "The Moyne Commission has officially returned today, and their news is not especially pleasant. We have received reports of what they refer to as 'slavery in a different form', with the plantation economy still being the main form of development within the islands. Among this, there are many other problems like United Fruit Company promoted prostitution in Jamaica, class divides in Guiana between Indo and Afro-Guianese, oil spilling in Trinidad & Tobago. Walter Guinness himself said that this generation is suffering from a century of neglect from the empire, and they expect the West Indies government to handle the problem immediately.\n\nNeedless to say, many Canadians are disgusted by the happenings in the West Indies, those who they see are very similar to them in ways. It has left a stain on the imperial family and the current government, one that the West Indies will hopefully erase soon for us."
 west_indies_federation_politics_events.16.a: "How could it have been so bad?"
 west_indies_federation_politics_events.17.t: "Suggestions from Walter Guinness and the Commission"
 west_indies_federation_politics_events.17.d: "Walter Guiness and the rest of the commission have come up with a suggestions to help the situation within the West Indies, and it is a two year fund into the West Indies to help them along their new multitude of projects to help the region. While this will take a toll on our income, it could serve significantly towards helping calm down the rampant socialist movements within the West Indies along with helping them develop their industries along the way."
 west_indies_federation_politics_events.17.a: "Increase our funding in the region"
 west_indies_federation_politics_events.17.b: "Surely this isn't our responsibility!"
 west_indies_federation_politics_events.18.t: "Funding from Canada"
 west_indies_federation_politics_events.18.d: "Thanks to the Moyne Commission, the imperial government has begun a slow overtime investment into the West Indies economy, granting a large sum over a period of two years. This has helped improve the face of the imperial family and Canada among our people, serving as a good way to calm down the socialist movements along with tensions with the empire. We can also expect to start construction projects to help increase the amount of jobs available within the West Indies overtime as a result. Hopefully this will pay off in the end."
 west_indies_federation_politics_events.18.a: "Hopefully this can assist us"
 west_indies_federation_politics_events.19.t: "Canada Refuses Aid"
 west_indies_federation_politics_events.19.d: "It seems the Moyne Commissions attempt to obtain funding for the development of the West Indies from the imperial government has failed, with it being stamped out in parliament. We are now expected to fund the multitude of projects as a result from the commission using our own measly income. This has also slightly strained relations among our populace, with the socialists suing this as another case of the empires betrayals against our people."
 west_indies_federation_politics_events.19.a: "We can make it on our own, then"
 west_indies_federation_politics_events.20.t: "Spreading of Calypso"
 west_indies_federation_politics_events.20.d: "Calypso which has begun to spread on the islands of Trinidad & Tobago has started to gain popularity not only within the Caribbean, but within the Americas as well. The songs by various Calypso artists like Atilla the Hun and Roaring Lion have been recorded and available for purchase around the world. Calypso is mainly troublesome from a political perspective, as it is used as a way to speak against the government through hidden meanings within their songs. As anti-Federation and anti-British sentiment begins to rise within the Federation, many governors fear the spread of this new style of music could cause people outside of the federation to sympathise with their cause."
 west_indies_federation_politics_events.20.a: "This is unacceptable, ensure politics is removed from Calypso"
 west_indies_federation_politics_events.20.b: "Free speech is a basic human right!"
 west_indies_federation_politics_events.21.t: "Living Standards Continue to Fall"
 west_indies_federation_politics_events.21.d: "As the decline of the United States shows no sign of abating along with Black Monday itself, the government's ability to react to the economic crisis has been limited at best. This can easily be seen as more continue to be jobless due to the closing of plantations and farms across the various islands, with many worrying about making it to tomorrow without food for their families. Many blame the government, specifically the unity party, for the failures of the federation's ability to deal with the declining situation. All we can do is continue on our current course to recovery despite the criticism despite the disappointment of many."
 west_indies_federation_politics_events.21.a: "We're trying our best"
 west_indies_federation_politics_events.22.t: "An Incident in Jamaica"
 west_indies_federation_politics_events.22.d: "As the country continues to fall into despair, Jamaica has been a hotbed of unrest as usual. Today was seen as a spark to the people, as a small group of recently unemployed farmers assembled around the capitol building of Kingston protesting against the Unity Party. This crowd eventually began to grow to fifty men. While no one knows who truly started it, a small regiment of police attempted to break up the group until violence eventually broke out. At the end of it, ten of the protestors had been sent to jail with the rest escaping to God knows where. Luckily, we have managed to keep the situation somewhat contained for now, largely preventing the story from spreading to the rest of Jamaica. No one knows what can happen in the future however..."
 west_indies_federation_politics_events.22.a: "A close call for sure"
 west_indies_federation_politics_events.24.t: "Strikes in Jamaica"
 west_indies_federation_politics_events.24.d.no_reforms: "With the Federation's economic troubles and internal political strife, there have been several calls for strikes in the heart of the Federation: Kingston. A few days ago, the fears of such event taking place in Kingston have finally come to pass, as a strike has been successfully called by the Kingston dock-workers of the United Fruit Company, with many other workers joining up their strike in support of their cause with the help of the Trade Union leader Alexander Bustamante.\n\nAs the strike went on, Bustamante travelled from meeting to meeting exhorting the people to stay focused and united and stay on strike for better wages, managing to convince the Transport Workers' and Factory Workers' representatives, almost paralysing the heart of Jamaica and crowding the surroundings of the Queen Victoria Statue. With a rousing speech, Bustamante assured the workers that with this show of solidarity he would be able to go forward and negotiate with the government on their behalf from a position of strength. As policemen began reaching the scene to contain the strikers, Bustamante called upon the people to go home in peace and stay united. However, his calls fell on deaf ears as the strikers began throwing rocks at the police, causing one of the officers to panic and order his troops to start making warning shots. As the situation escalated, the policemen were pushed back as the crowd began to overwhelm them. The crowd began advancing towards the Governor-General House near the intersection of Hagley Park Road and Half Way Tree Road. Hearing the news, the Governor was ordered to evacuate, but thankfully for us the crowd was stopped by the arrival of reinforcements from our police department, managing to break the strike and leading to the arrest of several influential figures, including Bustamante and William Grant. While many consider this to be a close call, our control over the city still stands strong."
 west_indies_federation_politics_events.24.d.some_reforms: "With the Federation's economic troubles and internal political strife, there have been several calls for strikes in the heart of the Federation: Kingston. A few days ago, the fears of such event taking place in Kingston have finally come to pass, as a strike has been successfully called by the Kingston dock-workers of the United Fruit Company, with many other workers joining up their strike in support of their cause with the help of the Trade Union leader Alexander Bustamante.\n\nAs the strike went on, Bustamante travelled from meeting to meeting exhorting the people to stay focused and united and stay on strike for better wages, managing to convince the Transport Workers' and Factory Workers' representatives, almost paralysing the heart of Jamaica and crowding the surroundings of the Queen Victoria Statue. With a rousing speech, Bustamante assured the workers that with this show of solidarity he would be able to go forward and negotiate with the government on their behalf from a position of strength. As policemen began reaching the scene to contain the strikers, Bustamante called upon the people to go home in peace and stay united, which eased tensions of an open conflict with the police force. However, In spite of his request for non-violence, small scale rioting led by radicalists throughout Kingston paired up with the vandalisation of government buildings has caused significant damage, although our hold on the city still stands strong."
 west_indies_federation_politics_events.24.d.all_reforms: "With the Federation's economic troubles and internal political strife, there have been several calls for strikes in the heart of the Federation: Kingston. A few days ago, the fears of such event taking place in Kingston have finally come to pass, as a strike has been successfully called by the Kingston dock-workers of the United Fruit Company, with many other workers joining up their strike in support of their cause with the help of the Trade Union leader Alexander Bustamante.\n\nAs the strike went on, Bustamante travelled from meeting to meeting exhorting the people to stay focused and united and stay on strike for better wages, but in the end his efforts were in vain. Many of the potential strikers have contented themselves with the reforms passed by our government not so long ago, and while there has been some small scale vandalism in the area perpetrated by radicalised workers, the strike has died out fairly peacefully and the city goes back to normality."
 west_indies_federation_politics_events.24.a: "Let's hope it stays that way"
 west_indies_federation_politics_events.25.t: "Fighting in Guyana"
 west_indies_federation_politics_events.25.d.no_reforms: "Following the events in Kingston, what started as a seemingly small dockworkers' strike has escalated into a full blown riot in the urban area near the Lamaha Canal in Georgetown. While the area had been relatively free of workers' unrest since the Ruimveldt Riots of 1905 and the Ruimveldt Shooting of 1924, the recent economic downturn has managed to respark the fires of rebellion in the area. As the situation escalated, more and more disgruntled workers from the Sugar Workers' Unions joined the strike, and the deployment of the Georgetown Garrison from the north towards the Botanical Garden only escalated the situation. When the dust settled, 13 rioters have been found dead, and at least 24 more have been hospitalised for their injuries. While the city now remains silent and solidly under our grasp, this riot marks yet another black chapter in Guyana's history. Nevertheless, the Georgetown garrison has been deployed around the city and will remain that way for some time in order to prevent another riot from breaking out."
 west_indies_federation_politics_events.25.d.some_reforms: "Following the events in Kingston, what started as a seemingly small dockworkers' strike has escalated into a full blown riot in the urban area near the Lamaha Canal in Georgetown. While the area had been relatively free of workers' unrest since the Ruimveldt Riots of 1905 and the Ruimveldt Shooting of 1924, the recent economic downturn has managed to respark the fires of rebellion in the area. As the situation escalated, the Georgetown garrison was deployed from their barracks in the north towards the Botanical Garden, pushing back the crowd into the narrow streets of the city, and while acts of vandalism have been recorded throughout Georgetown, the rioters were dispersed without civilian casualties and several of their leaders have been apprehended. Nevertheless, the Georgetown garrison has been deployed around the city and will remain that way for some time in order to prevent another riot from breaking out."
 west_indies_federation_politics_events.25.d.all_reforms: "Following the events in Kingston, what started as a seemingly small dockworkers' strike has escalated into a full blown riot in the urban area near the Lamaha Canal in Georgetown. While the area had been relatively free of workers' unrest since the Ruimveldt Riots of 1905 and the Ruimveldt Shooting of 1924, the recent economic downturn has managed to respark the fires of rebellion in the area. Thankfully, the riot hasn't grown out of control, and the damage to the city has been kept to a minimum. Nevertheless, the Georgetown garrison has been deployed around the city and will remain that way in order to prevent another riot from breaking out."
 west_indies_federation_politics_events.25.a: "One would think such a small city would be less troublesome..."
 west_indies_federation_politics_events.26.t: "Food Riots in the French Colonies"
 west_indies_federation_politics_events.26.d.no_reforms: "With the dependence on Tourism for most of their economy, the islands of Guadeloupe and Martinique have been hit hard by the recent economic downturn. As the prices of basic commodities, specially food, is higher and the average wages are lower than those in Jamaica or Guyana, it should be no surprise that workers and farmers in the area have finally become fed up with their situation. Strikers have started to go into the streets of their small island-cities in order to protest for an increase in their wages in order to be able to afford for their costs of living. Riots sparked in Fort-de-France and Baie-Mahault, and our local police quickly overwhelmed by the strength of the protestors. Luckily, a marine detachment managed to be deployed in time in order to contain the rioters, but this decision didn't came without a cost however. As our marines weren't prepared to deal with urban unrest, they decided to control the riot by firing on the protestors. Several rioters have been gravely injured and are receiving treatment at their local hospitals. There have been no reports of fatal casualties and we have managed to contain the situation, at least temporarily, and with promises of improved life conditions should prevent another riot from breaking out in the near future."
 west_indies_federation_politics_events.26.d.some_reforms: "With the dependence on Tourism for most of their economy, the islands of Guadeloupe and Martinique have been hit hard by the recent economic downturn. As the prices of basic commodities, specially food, is higher and the average wages are lower than those in Jamaica or Guyana, it should be no surprise that workers and farmers in the area have finally become fed up with their situation. Strikers have started to go into the streets of their small island-cities in order to protest for an increase in their wages in order to be able to afford for their costs of living. Riots sparked in Fort-de-France and Baie-Mahault, and while the local police has managed to deploy in time in order to prevent serious damage to our possessions, acts of vandalism throughout the city will definitely make a dent in our next monthly budget for the island. Nevertheless, we have managed to contain the situation and promises of improved conditions should prevent another riot from breaking out."
 west_indies_federation_politics_events.26.d.all_reforms: "With the dependence on Tourism for most of their economy, the islands of Guadeloupe and Martinique have been hit hard by the recent economic downturn. As the prices of basic commodities, specially food, is higher and the average wages are lower than those in Jamaica or Guyana, it should be no surprise that workers and farmers in the area have finally become fed up with their situation. Strikers have started to go into the streets of their small island-cities in order to protest for an increase in their wages in order to be able to afford for their costs of living. Luckily, our recent reforms have already alleviated most of their demands, and as such we have been able to quickly manage to contain the situation and convince them to disperse with promises of improved conditions."
 west_indies_federation_politics_events.26.a: "A Small Price to Pay for their Loyalty"
 west_indies_federation_politics_events.27.t: "Plantations problems in Trinidad and Tobago"
 west_indies_federation_politics_events.27.d.no_reforms: "With the collapse of the sugarcane industry and the failure of the cocoa industry as a result of the recent economic downturn, the Trinidad labour movement has begun to meteorically rise to prominence within the island. Led by Arthur Andrew Cipriani along with preacher Tubal Uriah Butler and many more, the Labour organisations have finally grown bold enough to declare general strike on the island. With both wings fighting side by side, our negotiations to end the strike quickly broke down, and after a few hours of an almost uncomfortable unrest, a massive riot broke out in the city of Port of Spain. While our police force was more than capable of handling the riot, several strikers as well as police officers have been wounded in the ensuing skirmishes, and the strike has become yet another stain in the public image of our administrations. Despite having apprehended the leaders of this strike, it seems like the labour unrest in the area has only just begun..."
 west_indies_federation_politics_events.27.d.some_reforms: "With the collapse of the sugarcane industry and the failure of the cocoa industry as a result of the recent economic downturn, the Trinidad labour movement has begun to meteorically rise to prominence within the island. Led by Arthur Andrew Cipriani along with preacher Tubal Uriah Butler and many more, the Labour organisations have finally grown bold enough to declare general strike on the island. While some of our recent reforms have managed to drive Cipriani's strikers into the negotiating table from the get-go, Butler's strikers' demands quickly outgrew his more moderate counterpart. After negotiations with Butler broke down, a riot sparked at the heart of Port-of-Spain. While our police force in the area was more than capable of containing the riots, our public image has been stained, and labour unrest in the area seem to have only just begun..."
 west_indies_federation_politics_events.27.d.all_reforms: "With the collapse of the sugarcane industry and the failure of the cocoa industry as a result of the recent economic downturn, the Trinidad labour movement has begun to meteorically rise to prominence within the island. Led by Arthur Andrew Cipriani along with preacher Tubal Uriah Butler and many more, the Labour organisations have finally grown bold enough to declare general strike on the island. Luckily, our recent labour reforms have allowed us to get some room to negotiate with the strikers, and while we will have to make a few extra concessions exclusively for the farmers of Trinidad, the strike is scheduled to be lifted as soon as the new legislation passes through. While this is a victory for our administration, it seems like the labour unrest in the area has only just begun..."
 west_indies_federation_politics_events.27.a: "Damn it!"
 west_indies_federation_politics_events.28.t: "Overview on the Compliance with the Moyne Commission Suggestions"
 west_indies_federation_politics_events.28.d.no_reforms: "The Moyne Commission has returned, and their impression of our reforms is most dire. We ignored all of their plans and ideas, and the string of unrest and strikes that we had earlier this year is proof of that. Their report on our development has been most damning, and the Crown is greatly disappointed of us."
 west_indies_federation_politics_events.28.d.some_reforms: "The Moyne Commission has returned, but their impression of our reforms isn't the best. While we heeded some of their plans, not managing to implement a good enough amount of them has left its scars on the country. Looking at the poor implementation of the initial report, and the strikes earlier this year, the updated report has been on the negative side, although it highlighted our desire to follow their plans, albeit at our slow pace. The Crown has not commented on our situation."
 west_indies_federation_politics_events.28.d.all_reforms: "The Moyne Commission has returned, and they seem most pleased. While we did not finish all the reforms, we're noted as being 'on the right track'. They remark that the mild strikes we had earlier this year could have been much worse, were we not to try our hardest to improve the situation of our citizens. The Crown has also expressed its good impressions towards the new report."
 west_indies_federation_politics_events.28.a: "Only we know what's better for the Federation!"
 west_indies_federation_politics_events.28.b: "We move at our own speed!"
 west_indies_federation_politics_events.28.c: "We're only doing what's best for the Federation."
 west_indies_federation_politics_events.29.t: "The Winds of Change in the Political Landscape"
 west_indies_federation_politics_events.29.d.start: "As the elections loom over the horizon, the events that lately shook our Federation, mainly the wave of unrest and the Moyne report, have resulted in big changes in the political landscape of our country."
 west_indies_federation_politics_events.29.d.end: "The National Conservative party still has a strong support base in the anglophile population, and stand a good chance at winning."
 west_indies_federation_politics_events.29.d.no_reforms: "$west_indies_federation_politics_events.29.d.start$\n\nThe total lack of reform has shunned people away from the Unity Party, making it a practical non-entity in the eyes of the electorate. The status of the reforms has also forced the Parti pour l'Autonomie into side lining their moderate members, and forming a coalition with the People's National Party, lead by Norman Manley.\n\n$west_indies_federation_politics_events.29.d.end$"
 west_indies_federation_politics_events.29.d.some_reforms: "$west_indies_federation_politics_events.29.d.start$\n\nThe lacklustre reforms have withered the support for the Unity Party, but efficient propaganda by them might still secure a win.\n\nDue to the increased tensions from a perceived lack of reform, the Parti pour l'Autonomie has had its more moderate members sidelined, and has formed a coalition with the People's National Party, lead by Norman Manley.\n\n$west_indies_federation_politics_events.29.d.end$"
 west_indies_federation_politics_events.29.d.all_reforms: "$west_indies_federation_politics_events.29.d.start$\n\nThe good attempt at reforms has guaranteed the Unity Party a shot at victory.\n\nDue to their most pressing issues being resolved, the Parti pour l'Autonomie has had its radical members sidelined, and has formed a coalition with the Labour Party, lead by Alexander Bustamante.\n\n$west_indies_federation_politics_events.29.d.end$"
 west_indies_federation_politics_events.29.a: "Onwards, to the elections!"
 west_indies_federation_politics_events.30.t: "Federal Elections"
 west_indies_federation_politics_events.30.d: "Despite all the setbacks in the recent time, the day has finally arrived for elections in the West Indies Federation to take place, without any issues having been reported so far. The parties have been fiercely campaigning for months, and the last few years still weigh heavily in the minds of the people. As the votes are cast into the ballots across the country, everyone asks themselves the same question: Who will win the struggle and receive the mandate to fix the issues that plague the Federation?"
 west_indies_federation_politics_events.30.a: "The PA-PNP Coalition!"
 west_indies_federation_politics_events.30.b: "The PA-LP Coalition!"
 west_indies_federation_politics_events.30.c: "The National Conservatives!"
 west_indies_federation_politics_events.30.e: "The Unity Party!"
 west_indies_federation_politics_events.31.t: "The Socialist Revolution"
 west_indies_federation_politics_events.31.d: "The socialist movement in the West Indies has been angered greatly, and it has seen its culmination. A revolution has been declared across the West Indies, and a syndicalist transitional government under Tubal Uriah Butler's British Citizens' and Workers' Home Rule Party has been instituted. The Governor-General has been ousted from his seat in Kingston, and the islands are experiencing rapid change."
 west_indies_federation_politics_events.31.a: "For the Revolution!"
 west_indies_federation_politics_events.3100.t: "Revolution in the West Indies"
 west_indies_federation_politics_events.3100.d: "It seems the mismanagement of the West Indies has finally become a flashpoint. The long-suppressed socialist movement in the Indies has been angered greatly by recent upheavals, triggering a revolution across the West Indies. A syndicalist transitional government under Tubal Uriah Butler's British Citizens' and Workers' Home Rule Party has been instituted. Our Governor-General has been ousted from his seat in Kingston, and now we face the possibility of an Internationale outpost right on our doorstep. We face a difficult choice - withdrawing will surely see the rebels align with our hated enemies in the Home Isles, yet a campaign in the Caribbean could take up vital resources needed for the reclamation of the Isles."
 west_indies_federation_politics_events.3100.a: "We must take them down!"
 west_indies_federation_politics_events.3100.b: "Withdraw. They are not worth the costs."
 west_indies_federation_politics_events.3101.t: "Officers Return to the West Indies"
 west_indies_federation_politics_events.3101.d: "With the revolt in the West Indies firmly crushed, the officers who had been previously assigned to the colonies have now departed back to return to their old positions within the Indies."
 west_indies_federation_politics_events.3101.a: "Hopefully they'll keep things stable this time."
 west_indies_federation_politics_events.32.t: "The Governor-General's Coup"
 west_indies_federation_politics_events.32.d: "As the socialist current encroached on the West Indies, the Governor-General kept receiving more and more complaints from his Majesty's most loyal subjects. More and more calls for equality and wealth distribution have muffled the cries for help of the people who helped the Crown most.\n\nAs the country has drifted further and further apart from the Crown, the Governor-General has made a hard choice today. He elected to listen to the demands of the few loyalists left in the federation and moved in with the army to replace the democratically elected government. Martial law has been declared, and steps have started to be taken to revert the most damaging reforms."
 west_indies_federation_politics_events.32.a: "Long live the King! God save the West Indies Federation!"
 west_indies_federation_politics_events.33.t: "The Future Powers of the Governor-General"
 west_indies_federation_politics_events.33.d: "While the Governor-General is an unifying figure, alongside the monarch, in the eyes of the British, the French feel like they are constantly reminded by their British subjugation. They ask for the local French governors to have equal power to the Governor-General, to be able to veto everything issued by the Governor-General with respect to their colonies. This of course, usurps the central authority and angers the British subjects, seeing it as sowing dissent in the Federation."
 west_indies_federation_politics_events.33.a: "Accept the French proposal."
 west_indies_federation_politics_events.33.b: "The Governor-General is representing the Crown, this is madness!"
 west_indies_federation_politics_events.34.t: "Sending the Invitations to the Conference"
 west_indies_federation_politics_events.34.d: "As we are close to finishing our preparations for the conference, the most important part is about to commence: calling the Parti pour l'Autonomie and the National Conservatives representatives to join us at the hall. Let us hope that nothing bad happens until we start."
 west_indies_federation_politics_events.34.a: "Send the invitations!"
 west_indies_federation_politics_events.35.t: "The Parti pour l'Autonomie Arrives"
 west_indies_federation_politics_events.35.d: "The delegation of the Parti pour l'Autonomie has arrived at the agreed upon location, with no issues. However, as soon as they arrived, representatives from Légitimus's and Lémery's factions have already started to quarrel on the minutiae of the ideas they'll present at the conference."
 west_indies_federation_politics_events.35.a: "Let's hope they don't resort to violence."
 west_indies_federation_politics_events.36.t: "The National Conservatives Arrive"
 west_indies_federation_politics_events.36.d: "The National Conservative delegation has arrived, and have kept a safe distance from the Parti pour l'Autonomie, to ensure that they won't be provoked into an unfortunate incident. It seems they really do desire to seek compromise for the betterment of the Federation, as long as it doesn't come with too many concessions at the detriment of the British."
 west_indies_federation_politics_events.36.a: "Well, at least they're prepared."
 west_indies_federation_politics_events.37.t: "The Conference is Prepared"
 west_indies_federation_politics_events.37.d: "With every party having taken their seats, we can start the conference, with the best interests of the country in mind. Let us put away our differences in the name of the people of the Federation!"
 west_indies_federation_politics_events.37.a: "Let's begin!"
 west_indies_federation_politics_events.38.t: "The Status of the Parti pour l'Autonomie"
 west_indies_federation_politics_events.38.d: "While they are the main reason for the coup, the Governor-General could still keep the Parti pour l'Autonomie legal, and have them send representatives to the capital to consult with the Governor-General. However, while this would temper some of the tensions in the socialist camp, it would look bad in the eyes of the general populace."
 west_indies_federation_politics_events.38.a: "Allow it to operate"
 west_indies_federation_politics_events.38.b: "Ban it!"
 west_indies_federation_politics_events.39.t: "The West Indies Confederation"
 west_indies_federation_politics_events.39.d: "The Parti pour l'Autonomie government in the West Indies Federation has been preparing this bill for months, but today the deed was done: they severed all ties with the Canadian government, except their allegiance to the crown and the Entente. They are now de facto independent, but have promised to remain loyal to the duties that come with being subjects to his Majesty."
 west_indies_federation_politics_events.39.a: "We shall accept the wishes of the West Indies people."
 west_indies_federation_politics_events.39.b: "This is an affront to Canada! We shall invade to restore order soon enough!"
 west_indies_federation_politics_events.40.t: "Canada Declares War"
 west_indies_federation_politics_events.40.d: "In response to the change of our relationship, Canada has declared war on us. The Governor-General has ensured us that his loyalty is to the people of the West Indies, and that his Majesty laments this course of action."
 west_indies_federation_politics_events.40.a: "To arms!"
 west_indies_federation_politics_events.42.t: "The Governor-General Retires"
 west_indies_federation_politics_events.42.d: "After more than a decade of faithfully serving king and country, Sir Eustace Fiennes has decided to retire at the ripe old age of 75. His Majesty has decided that his successor will be the leader of the Unity Party, Sir Gordon James Lethem."
 west_indies_federation_politics_events.42.a: "A new era in the Federation"
 west_indies_federation_politics_events.100.t: "Trinidad & Tobago & Calypso"
 west_indies_federation_politics_events.100.d: "The suppression of political messages in Calypso has ironically birthed politically bound protests. Trinidad & Tobago has seen many rally behind prominent Calypso artists like Attila the Hun, Roaring Lion, and Lord Invader, declaring it a suppression of free speech. While there haven't been complete protests, Governor Bede Clifford has reported a general sense of unease among the people, which doesn't help the already high unrest on the islands."
 west_indies_federation_politics_events.100.a: "Come on, it's only music"
 west_indies_federation_politics_events.101.t: "The Calypso King"
 west_indies_federation_politics_events.101.d: "Today is the first ever 'Calypso King' contest, where various Calypso artists in Trinidad & Tobago are going to be competing to become King of Calypso. The top three candidates who were expected to win were Calypso veteran Attila the Hun, Roaring Lion, and former boxer Calypso 'new guy' Growling Tiger. as seen as unexpected by most, Growling Tiger has managed to completely stomp the competition, winning with his hit song 'Trade Union'."
 west_indies_federation_politics_events.101.a: "Congratulations to Growling Tiger!"
 west_indies_federation_politics_events.102.t: "The West Indies Plantations"
 west_indies_federation_politics_events.102.d: "The laws concerning the plantations are old, some even from the time of slavery. This is clearly visible when seeing the quality of life and the rights of our plantation workers, which are appalling. These workers are the one of the main sources of socialist unrest, and they are striking more and more, while working less and less. However, any reform that brings these people to a higher standard of living would be met by resistance from the owners of the plantations, since it would cut their profits. It would also reduce one of the main sources of revenue of taxation of the federation itself, while making ourselves weaker in the eyes of Canada."
 west_indies_federation_politics_events.102.a: "Pass laws codifying higher living standards."
 west_indies_federation_politics_events.102.b: "Ensure they keep working, plantation workers need no additional privileges."
 west_indies_federation_army_events.5.t: "The Resignation of Thomas Cubbit"
 west_indies_federation_army_events.5.d: "Though some knew this was coming, Thomas Cubbit still surprised many by resigning as Governor of Bermuda today at 9:00 AM. He has now met with both the West Indian and the Canadian government, and has officially retired from all politics and the army as well, wishing to enter retirement as he enters what he predicts to be the last years of his life. His position has been filled by another well-known general from the Great War, Reginald Hildyard. Reginald has promised to continue what Cubbit started in Bermuda, by assisting development there and helping the West Indies Federation improve its army."
 west_indies_federation_army_events.5.a: "A sad but necessary day"
 west_indies_federation_army_events.9.t: "The Naval Situation"
 west_indies_federation_army_events.9.d: "Despite how much Cunningham and Leatham get along and agree on some aspects of naval control, they hold one very fundamental difference. Leatham has long been an advocate for naval reform within the British Empire and desires to bring his plans of a smaller but more controlled navy to fruition, meant on defending the Caribbean. Cunningham believes in the exact opposite, he believes reclaiming the mainland is the duty of the West Indies as a part of the empire, and thinks the navy should be a critical part in assisting with that. We're left with the choice of who to side with. Many believe siding with Cunningham as Commander in-Chief of the West Indies station, but some are excited by the prospect of Leatham's plan..."
 west_indies_federation_army_events.9.a: "Side with Cunningham"
 west_indies_federation_army_events.9.b: "Side with Leatham"
 west_indies_federation_army_events.10.t: "Request from the West Indies"
 west_indies_federation_army_events.10.d: "The West Indies has given us an offer to take old ships from the Great War off our hands, as we have little use for them. Not being used for years now, the West Indies plans to use these as a base of a better navy to help themselves and us achieve victory in the end, so we could benefit from this."
 west_indies_federation_army_events.10.a: "Sign off the deal"
 west_indies_federation_army_events.10.b: "Refuse the deal"
 west_indies_federation_army_events.11.t: "The Ships Dock"
 west_indies_federation_army_events.11.d: "Canada has accepted our request, sending us many Great War and in some cases pre-Great War ships. While they are in somewhat rough condition, they serve as a good base to make our navy off of into the future."
 west_indies_federation_army_events.11.a: "To the future"
 west_indies_federation_army_events.12.t: "The Ships Never Arrive"
 west_indies_federation_army_events.12.big: "Despite our best efforts, Canada has refused our request and the ships never did arrive in the West Indies. Why they did this we might never know, but all that this signifies for us is an early end to Cunningham's doctrine and needing to move to Leatham's anyways due to the lack of ships."
 west_indies_federation_army_events.12.small: "Despite our best efforts, Canada has refused our request and the ships never did arrive in the West Indies. Why they did this we might never know, but all that this signifies for us is a higher need to produce our own ships to use into the future."
 west_indies_federation_army_events.12.a: "We'll carry on"
 west_indies_federation_army_events.13.t: "A New Socialist Army"
 west_indies_federation_army_events.13.d: "For we have carried out our revolution, we must now build up our army further. A new military is needed for the West Indies to carry out the Socialist Revolution. To do so, we must begin to train and scour for troops who will serve our new regime to the very end."
 west_indies_federation_army_events.13.a: "Arise, soldiers!"
 west_indies_federation_foreign_policy_events.1.t: "Anti American Riots Spread in Puerto Rico"
 west_indies_federation_foreign_policy_events.1.d: "With the Civil War now in full swing, we have received unnerving reports from the Governor of Puerto Rico, Blanton Winship, about anti-American rallies and protests asking for independence of the island from our government. While secessionism in Puerto Rico has been strong since the US annexed it back in 1898, it had never gathered enough strength to threaten the Governorship. With our hands full on the mainland, the Governor has requested for us to give him exceptional powers to handle the situation and try to seek a resolution. What should we do?"
 west_indies_federation_foreign_policy_events.1.a: "These Rabble Rousers will Disperse on their Own"
 west_indies_federation_foreign_policy_events.1.b: "Tell the Governor to Handle it on His Own"
 west_indies_federation_foreign_policy_events.1.c: "Tell the Governor to Handle it on His Own (Play as Puerto Rico)"
 west_indies_federation_foreign_policy_events.2.t: "Puerto Rico Given to the Entente"
 west_indies_federation_foreign_policy_events.2.d: "The US government has decided to give us the island of Puerto Rico. There is talk among our military that the island provides a perfect position for our fleet to operate in the Southern Atlantic. Still, others believe it should belong to our friends in the West Indies."
 west_indies_federation_foreign_policy_events.2.a: "Puerto Rico shall become a part of the Federation"
 west_indies_federation_foreign_policy_events.2.b: "Prepare to turn the island into a naval base"
 west_indies_federation_foreign_policy_events.3.t: "Puerto Rico Given to the Federation"
 west_indies_federation_foreign_policy_events.3.d: "Canada has declared that the former US island of Puerto Rico shall become a Federation possession. It is a great day for the whole of the West Indies!"
 west_indies_federation_foreign_policy_events.3.a: "Time to celebrate!"
 west_indies_federation_foreign_policy_events.4.t: "Puerto Rico Integrated"
 west_indies_federation_foreign_policy_events.4.d: "After years have passed since the American civil war started, and Puerto Rico was given to us, its integration in our state apparatus has been completed, and Puerto Ricans have become active members of our armed forces and political life."
 west_indies_federation_foreign_policy_events.4.a: "3 Hurrahs for the newest member in our federation!"
 west_indies_federation_foreign_policy_events.5.t: "[From.GetName] Asks Us for a General"
 west_indies_federation_foreign_policy_events.5.d: "[From.GetName] needs foreign expertise in furthering their army. As brothers in revolution, it is our duty to help them further the cause. The committee has decided that James Francis Brewer would be best for the job."
 west_indies_federation_foreign_policy_events.5.a: "Send him."
 west_indies_federation_foreign_policy_events.5.b: "We cannot afford to send anyone right now."
 west_indies_federation_foreign_policy_events.6.t: "[From.GetName] Asks Us for a General"
 west_indies_federation_foreign_policy_events.6.d: "[From.GetName] needs foreign expertise in furthering their army. As fellow subjects of the Crown, it is our duty to help them become more proficient in liberating the homeland. The high command has decided that Philip Neame would be best for the job."
 west_indies_federation_foreign_policy_events.6.a: "Send him."
 west_indies_federation_foreign_policy_events.6.b: "We cannot afford to send anyone right now."
 west_indies_federation_foreign_policy_events.7.t: "[From.GetName] Accepted our Request"
 west_indies_federation_foreign_policy_events.7.d: "[From.GetName] has accepted our request to grant us a general."
 west_indies_federation_foreign_policy_events.7.a: "Let's hope he will prove Useful to us."
 west_indies_federation_foreign_policy_events.8.t: "[From.GetName] Rejected our Request"
 west_indies_federation_foreign_policy_events.8.d: "[From.GetName] has refused to grant us a general, claiming they could not spare anyone."
 west_indies_federation_foreign_policy_events.8.a: "Damn it."
 west_indies_federation_foreign_policy_events.9.t: "Dutch West Indian Possessions Taken"
 west_indies_federation_foreign_policy_events.9.d: "In the wake of Dutch capitulation, our government ordered the seizure of nearby Dutch colonies without a moment of hesitation. We cannot allow a hostile power to gain a foothold in the region."
 west_indies_federation_foreign_policy_events.9.a: "We will protect them."
 west_indies_federation_foreign_policy_events.10.t: "[From.GetName] Seizes Our Colonies"
 west_indies_federation_foreign_policy_events.10.d: "[From.GetName] has taken invaded our Caribbean possessions in the wake of our capitulation. Perhaps one day we will be able demand their return."
 west_indies_federation_foreign_policy_events.10.a: "Damn."
 west_indies_federation_politics_events.499.t: "Ottawa Visit Announced"
 west_indies_federation_politics_events.499.d: "It caused us immense backlash. Voters are embarrassed by the fact that the first place where our head of government is going is Ottawa. The post-election tension only builds up. Many people think that the neglected parts of the Federation should be visited first."
 west_indies_federation_politics_events.499.a: "They do not understand"
 west_indies_federation_politics_events.500.t: "The Delegation Arrives in Ottawa"
 west_indies_federation_politics_events.500.d: "Upon arrival in Ottawa, a great welcome ceremony took place. During the meeting with the king numerous assurances about mutual cooperation were made. The Canadian press praised our new government for its loyalty. At the same time, the pressure from the country began to build up. Our people want us to take advantage of this opportunity and gain some economic help from Canada. We must decide whether to limit ourselves to strengthening our position in the alliance. We can also risk our good relations and ask them to send us support. If the king refuses us, we may be compromised in the country."
 west_indies_federation_politics_events.500.a: "God save the King"
 west_indies_federation_politics_events.500.b: "God save the King and the people of West Indies"
 west_indies_federation_politics_events.501.t: "Ottawa Pledge"
 west_indies_federation_politics_events.501.d: "A new leader of the West Indies Federation has come to Ottawa. After the magnificent ceremony of pledging allegiance to the king, a series of diplomatic meetings took place. After 3 days, the visit has come to an end. Our old alliance has strengthened even more."
 west_indies_federation_politics_events.501.a: "Splendid"
 west_indies_federation_politics_events.502.t: "West Indies Wants Our Assistance"
 west_indies_federation_politics_events.502.d: "A new leader of Western India had came to Ottawa. After the magnificent ceremony of pledging allegiance to the king, a series of diplomatic meetings took place. After 3 days visit has come to an end. Our old alliance has strengthened even more. But at the end of the visit, representatives of West Indies began to put forward increasingly bold demands. We must decide whether we will send them demanded help and allow our relationship to blossom. Also it will allow to strengthen new government in Kingston. But is the stability of the political scene in West India more important than the interests of Canadians?"
 west_indies_federation_politics_events.502.a: "Fulfil the request"
 west_indies_federation_politics_events.502.b: "Reject the request"
 west_indies_federation_politics_events.503.x: "King [CAN.GetLeader] appreciated our devotion and praised our Federation many times. This has allowed us to build up the popularity of our party and calm the social unrest."
 west_indies_federation_politics_events.503.y: "What a success! In the coming days, help from Canada will come to our shores. We showed our citizens that this is truly their government."
 west_indies_federation_politics_events.503.z: "A disaster! The king refused to help us. How can we now convince our citizens to the idea of consolidation without the help of Canada?"
 west_indies_federation_politics_events.503.t: "Results of Ottawa pledge"
 west_indies_federation_politics_events.503.a: "After all it was worth the effort"
 west_indies_federation_politics_events.504.t: "French (East) Guyana incident"
 west_indies_federation_politics_events.504.d: "Today, after the government of West Indies announced a plan to strengthen ties with former French colonies, a group of 100 people stormed the town hall in Cayenne. Local residents are convinced that they will manage to win even more autonomy. Kingston has been alarmed that East Guyana is getting out of our hands. The government, however, stands firmly in its policy, it may exacerbate the situation in other French-speaking areas. Experts are convinced that the so-called East Guyana incident will quickly die. They treat it as an alarming outbreak of the local population rather than an organised uprising. After all, in order to avoid the widespread rebellion, we must calm the unrest in East Guyana as soon as possible."
 west_indies_federation_politics_events.504.a: "They can not threaten us"
 west_indies_federation_politics_events.505.t: "Bauxite Mine Strike in East Guyana"
 west_indies_federation_politics_events.505.d: "An armed group of 35 people took control of the largest bauxite mine in East Guyana. According to our informers, 4 guards were killed during the fight. To our surprise, the local police department refused to intervene. We are afraid that the level of loyalty in police departments of former French colonies is too low to entrust to them any task."
 west_indies_federation_politics_events.505.a: "Barbaric"
 west_indies_federation_politics_events.506.t: "Reaction from Kingston"
 west_indies_federation_politics_events.506.d: "Edward Brandis Denham, in response to his countrymen from Eastern Guiana, said that the violence we witnessed in the last days would not give rise to a similar crime on his part. However, to stop this barbarity, it will be necessary to send a group of experienced Jamaican policemen. He promised that all the detainees would face a just court that would assess their guilt. He ended his speech with the following words:"
 west_indies_federation_politics_events.506.a: "The time for consolidation has come"
 west_indies_federation_politics_events.507.t: "Islanders Support"
 west_indies_federation_politics_events.507.d: "Today, Félix Éboué's statement reached all radio stations and newspapers in the Caribbean Sea basin. The governor of Martinique and Guadeloupe expressed support for the brothers from East Guyana. He explicitly opposed violence as a solution, but he drew attention to the fact that the conservative government of Edward Brandis Denham violated all previous arrangements that enabled the functioning of the French-British fragile cohabitation. He also referred to national pride and the need to defend French identity. The manifesto met with a broad response from the French population of West Indies. Tonight, numerous support marches are planned and the windows are full of French flags. Moreover during this celebration in East Guyana great fire broke out which consumed much of the city of Cayenne."
 west_indies_federation_politics_events.507.a: "The time has come for consolidation"
 west_indies_federation_politics_events.508.t: "Who Will be the Chairman during the Trials?"
 west_indies_federation_politics_events.508.d: "We must decide who will lead the judgeship during the trials. This will have a strong impact on type of the punishment and more importantly on the social reception of this entire spectacle. A party demanding the most severe penalties is proposing a young and ambitious judge from the Bahamas to be a chairman. This judge is known for his effectiveness in combating organised crime on his native islands and in Jamaica. On the other hand, some politicians are afraid of even greater social tensions in the French part of our Federation and they offer an experienced judge from Montreal. This is an option that would surely please the king too. However, this judge is famous for his liberal views and aversion to the death penalty. We must decide about the direction of our legal system."
 west_indies_federation_politics_events.508.a: "The judge from Bahamas"
 west_indies_federation_politics_events.508.b: "The judge from Montreal"
 west_indies_federation_politics_events.509.t: "Weren't They too Harsh?"
 west_indies_federation_politics_events.509.d: "After a long trial with many testimonies, including from the wife of the deceased guard, the judge leaned back in his seat. It was time to deliver the sentence. The crowd clamored for the death penalty, but quieted as the judge stood. Taking a deep breath, the judge made his decision. The punishment would be..."
 west_indies_federation_politics_events.509.a: "Death sentence"
 west_indies_federation_politics_events.509.b: "Public execution"
 west_indies_federation_politics_events.509.c: "Life sentence"
 west_indies_federation_politics_events.510.t: "Weren't They too Gentle?"
 west_indies_federation_politics_events.510.d: "The judge began his justification by quoting Christian respect for life. Based on wonderful common law, he decided to give judgment that respects life and justice. Should the crimes be given diverse sentences, or as a group??"
 west_indies_federation_politics_events.510.a: "Diverse sentences (from life-time to 10 years)"
 west_indies_federation_politics_events.510.b: "Parole"
 west_indies_federation_politics_events.511.t: "New Governor of Guadeloupe and Martinique"
 west_indies_federation_politics_events.511.d: "In the next month we will have to choose a new Governor of Guadeloupe and Martinique. Unfortunately, our candidate was discredited among the local population. The only options are the PA candidates. We were able to contact Donald Sangster. We are sure that he will help us in implementing integration policy. He is ready for reforms. However, the population is fully in favour of Hégésippe Légitimus. Unfortunately, this choice may make it difficult for us to continue integration. Hégésippe Légitimus will certainly focus on the interest of the French proletariat, not the good of the Federation."
 west_indies_federation_politics_events.511.a: "Donald Sangster"
 west_indies_federation_politics_events.511.b: "Hégésippe Légitimus"
 west_indies_federation_politics_events.512.t: "Head of the Federal Institute"
 west_indies_federation_politics_events.512.d: "At the head the Federal Institute can be either a radical and authoritarian Ralph Gray or the Minister of Internal Affairs Robert Arundell. Unfortunately, as the head of the ministry, he will have less time to engage in integration. However, Gray is famous for his very radical views and will certainly destabilise West Indies Federation."
 west_indies_federation_politics_events.512.a: "Ralph Gray"
 west_indies_federation_politics_events.512.b: "Robert Arundell"
 west_indies_federation_politics_events.513.t: "The Situation is Improving"
 west_indies_federation_politics_events.513.d: "We managed to get out of the integration fiasco created by NCP. Their plan failed but we managed to regain control over the region. Their bad decisions won't harm our agenda."
 west_indies_federation_politics_events.513.a: "Great!"
 west_indies_federation_politics_events.514.t: "School Strike"
 west_indies_federation_politics_events.514.d: "Our elementary education system allows teaching French. This subject, however, is of marginal significance. To get the best education you need to know English. This is the result of a long-term underfunding of schools with Francophone affiliations. The teachers disturbed by the difference in the quality of teaching, started a strike. They are supported by local elites and clergy. They can also count on the support of local people. NCP sees the sleeping potential of these schools. We must decide whether to allocate funds for their funding."
 west_indies_federation_politics_events.514.a: "Let them strike"
 west_indies_federation_politics_events.514.b: "Promise subsidies"
 west_indies_federation_politics_events.516.t: "Guyana Criminals Lynched"
 west_indies_federation_politics_events.516.d: "In the prison of Port of Spain, criminals from Guyana are detained. Because of the failure of our state to decide on their future, the residents of Trinidad decided themselves to bring justice. They got sick from waiting. Today in the evening the crowd stormed the prison. During the fuss an accidental fire broke out. Unfortunately, despite the efforts of firefighters, fire got out of our control. The vast areas of the city were destroyed. Important industrial plants have been devastated. Unfortunately, such a price is paid for dismissing justice and delay."
 west_indies_federation_politics_events.516.a: "Damn"
 west_indies_federation_politics_events.517.t: "Flyer in French Addressed"
 west_indies_federation_politics_events.517.d: "The Federal Institute has analysed the manifesto and selected a few key proposals that will be easy to implement or ones that will bring tangible benefits to the entire Federation."
 west_indies_federation_politics_events.517.a: "Mount Pelée Street issue"
 west_indies_federation_politics_events.517.b: "Great exhibition"
 west_indies_federation_politics_events.517.c: "Economic integration programme"
 west_indies_federation_politics_events.518.t: "Mount Pelée Street Issue"
 west_indies_federation_politics_events.518.d: "On 8 May 1902, a volcanic eruption of Mount Pelée destroyed the town of Saint-Pierre. Moments later, all but a handful of its nearly 30,000 residents were dead, including the governor, who had come with his family to reassure the population. And in our capital of Kingston there is a street named: Mount Pelée Street. In the manifesto they demand us to change this name. It is ridiculous. It was not named in order to mock this tragedy. But we may make use this in our advantage. We can change it and honour king Edward. We can also honour Victims of this tragedy. And finally we can build a monument in their honour.\n\nThe more expensive the option, the greater the chances of success. The costs of each decisions (in political power)\nA: 10pp\nB: 12pp\nC: 25pp"
 west_indies_federation_politics_events.518.a: "Name it after King Edward"
 west_indies_federation_politics_events.518.b: "Name it after the Victims of the Moun Pelée"
 west_indies_federation_politics_events.518.c: "Build a monument for those victims"
 west_indies_federation_politics_events.519.t: "Great Exhibition of West Indies Culture"
 west_indies_federation_politics_events.519.d: "Another noteworthy idea is to organise an exhibition on the culture of French Antilles. Of course, it will be an exhibition about the entire Federation, and the French Antilles will be presented as an integral part of the federation. We can choose where this exhibition is about to take place. The larger the range of the exhibition, the greater the chance of satisfying the supporters of the manifesto.\n\nThe more expensive the option, the greater the chances of success. The costs of each decisions (in political power)\nA: 15pp\nB: 25pp\nC: 40pp\n"
 west_indies_federation_politics_events.519.a: "Homeland"
 west_indies_federation_politics_events.519.b: "Ottawa and New York"
 west_indies_federation_politics_events.519.c: "World Tour"
 west_indies_federation_politics_events.520.t: "Economic Integration Programme"
 west_indies_federation_politics_events.520.d: "We can concentrate on 1 of 3 options. The first is to enlarge the port in Port of France. The second considers transferring the fish processing plants back to the Port of France. These factories in 1934 moved to Kingston due to economic reasons. The third option is a wide programme of industrial development using local potential. This project seems to be particularly difficult. However, it will allow the economic and commercial linking of the federation industry.\n\nYou have starting 66% chance of success. The costs of each decisions (in political power)\nA: 30pp\nB: 60pp\nC: 90pp\n"
 west_indies_federation_politics_events.520.a: "Build up docks of Port of France"
 west_indies_federation_politics_events.520.b: "Send factories from Jamaica to Port of France"
 west_indies_federation_politics_events.520.c: "Great industrial project"
 west_indies_federation_politics_events.521.t: "How hard should we work on this"
 west_indies_federation_politics_events.521.d: "We must decide how much we will get involved in this project. It will increase costs but it will also increase the chances of success!"
 west_indies_federation_politics_events.521.a: "+0%"
 west_indies_federation_politics_events.521.b: "+50%"
 west_indies_federation_politics_events.521.c: "+100%"
 west_indies_federation_politics_events.522.t: "Flyer in French Effects"
 west_indies_federation_politics_events.522.d: "Let's hope we succeeded. The political cost may be high, but it will be worth it."
 west_indies_federation_politics_events.522.a: "What has happened?"
 west_indies_federation_politics_events.522.b: "What has happened?"
 west_indies_federation_politics_events.522.c: "What has happened?"
 west_indies_federation_politics_events.523.t: "French-Caribbean Exchange Programme"
 west_indies_federation_politics_events.523.d: "Some scholars from the Sorbonne, with connections within our Federation, invited French-speaking students to study in Paris. Our government has been sent such cooperation proposal. On the one hand, it seems unworthy to cooperate with syndicalists. On the other hand, we can export some syndicalists to a country where they would be welcomed. They might not come back."
 west_indies_federation_politics_events.523.a: "Sign it."
 west_indies_federation_politics_events.523.b: "Reject it."
 west_indies_federation_politics_events.524.t: "French-Caribbean Exchange Programme"
 west_indies_federation_politics_events.524.d.ncp: "Students sent to Paris for exchange are about to return to the Port of France. We thought that the life in Paris would show them the reality of syndicalism. But they were treated like kings there. Some of them decided to stay in France and we thank them for it. Less problems for us. However, our intelligence states, after a detailed collection of evidence, that returning students pose a threat to our democracy. During the scholarship, they succumbed to radicalisation and may initiate unrest."
 west_indies_federation_politics_events.524.d.other: "French-Caribbean Exchange Programme is over. Due to the government change all the students had to prematurely come back home. Maybe knowledge gained abroad will be useful to them here."
 west_indies_federation_politics_events.524.d.fallen_commune: "A contract with the government in Paris is no longer binding. Citizens of the West Indies Federation staying in France can contact the government in Jamaica if they want to return. Some of them, however, look for a shelter in the European centres of socialism. Fall of Paris broke their hearts."
 west_indies_federation_politics_events.524.a: "Allow them to come back."
 west_indies_federation_politics_events.524.b: "Prohibit them from entering."
 west_indies_federation_politics_events.524.c: "Welcome home."
 west_indies_federation_politics_events.524.e: "Commune of France is gone."
 west_indies_federation_politics_events.525.t: "Address the Capitalist Economy in the Constitution"
 west_indies_federation_politics_events.525.d: "We must establish the legal basis for our economy in the constitution. Most of our peers from NCP are in favour of conservative capitalism. A transparent system will create great conditions for an economic boom. We have 3 options to choose from:\n\n1. Clear rules of the capitalistic economy.\n\n2. Refer only to basic issues to satisfy more people.\n\n3. There are too many syndicalists in this country. Ignore the issue in the constitution.\n\nFor the quality of the constitution, clarity of regulations would be important. However, it will be easier to pass a constitution that suits a larger group."
 west_indies_federation_politics_events.525.a: "1. Gain quality, lose voters."
 west_indies_federation_politics_events.525.b: "2. Status quo."
 west_indies_federation_politics_events.525.c: "3. Lose quality, gain voters."
 west_indies_federation_politics_events.526.t: "Address Citizens' Rights in the Constitution"
 west_indies_federation_politics_events.526.d: "We need to establish a package of fundamental rights for our citizens. Of course given rights must respect traditional values. Despite this our party knows that some changes are needed. We have 3 options to choose from:\n\n1. A modern package of fundamental rights that is going to be unpopular in our own party.\n\n2. Copy this passage from the current constitution.\n\n3. Constitution can not guarantee anything. Let's not make more concessions.\n\nFor the quality of the constitution, it would be important to codify fundamental rights compatible with the modern days. However, it will be easier to pass a constitution that suits a larger group."
 west_indies_federation_politics_events.527.t: "Address Political System Solutions in the Constitution"
 west_indies_federation_politics_events.527.d: "NCP has always fought to create a strong federation in which there are no autonomous regions. Writing a new constitution allowed us to prevent future attempts to fragment our federation. We have 3 options to choose from:\n\n1. Strong federation.\n\n2. Federation, but with the possibility of autonomous regions.\n\n3. Leave the system as it is.\n\nFor the quality of the constitution, it would be important to modernise the provisions defining the political system of West Indies. On the other hand, the NCP has exhausted many of its resources for the consolidation process. The reticent constitution seems to be an easier solution."
 west_indies_federation_politics_events.528.t: "Address Rule of Law in the Constitution"
 west_indies_federation_politics_events.528.d: "West Indies Federation is a proud country, but we must be aware that in terms of government, we are departing from European standards. In the constitution, we can create instruments to effectively combat pathologies that ruin the work of the NCP. We have 3 options to choose from:\n\n1. Efficient instruments to fight corruption and crime.\n\n2. The state operates efficiently in this regard today.\n\n3. We should not fight it. It could backfire at us.\n\nFor the quality of the constitution, it would be important to create a legal order in which our prosperity and strength would develop. Remember, however, that the fight against many fronts can end tragically for us."
 west_indies_federation_politics_events.529.t: "Address our Relation with Canada in the Constitution"
 west_indies_federation_politics_events.529.d: "We must name our precise relationship with Canada in the constitution. We have 3 options to choose from:\n\n1. Define our relationship in detail.\n\n2. Name the basics of the relationship.\n\n3. Ignore the topic.\n\nFor the quality of the constitution, it would be important to define this relationship. However, some of our opponents would prefer to see only ambiguous answers in the constitution."
 west_indies_federation_politics_events.530.t: "Polishing our New Constitution"
 west_indies_federation_politics_events.530.d: "We can sacrifice some resources in order to improve the quality of the constitution that we are writing currently."
 west_indies_federation_politics_events.530.a: "Everybody needs to work harder"
 west_indies_federation_politics_events.530.b: "Work on it"
 west_indies_federation_politics_events.530.c: "Today we rest"
 west_indies_federation_politics_events.531.t: "Try to Secure New Votes"
 west_indies_federation_politics_events.531.d: "We can try to gain some additional votes for our new constitution. Some members of our government suggest that we can try some more effective ways og gaining supporters."
 west_indies_federation_politics_events.531.a: "Try talking them into it"
 west_indies_federation_politics_events.531.b: "Try promising favours"
 west_indies_federation_politics_events.531.c: "Try corruption"
 west_indies_federation_politics_events.612.t: "NCP Votes"
 west_indies_federation_politics_events.612.d: "Make concessions for NCP votes. Some funds are going to be allocated to the implementation of their goals. Are we ready to sacrifice enough to get a political ally?"
 west_indies_federation_politics_events.612.a: "Accept!"
 west_indies_federation_politics_events.612.b: "Reject!"
 west_indies_federation_politics_events.613.t: "Unity Votes"
 west_indies_federation_politics_events.613.d: "Make concessions for Unity Party votes. Some funds are going to be allocated to the implementation of their goals. Are we ready to sacrifice enough to get a political ally?"
 west_indies_federation_politics_events.614.t: "Social Democrats Votes"
 west_indies_federation_politics_events.614.d: "Make concessions for Social Democrats votes. Some funds are going to be allocated to the implementation of their goals. Are we ready to sacrifice enough to get a political ally?"
 west_indies_federation_politics_events.615.t: "Conscription Dilemma"
 west_indies_federation_politics_events.615.d: "The Social liberals focus mainly on pacifism. Therefore there is no reason to increase the conscription to the army. That is why we can delegate part of the population back to the economy. This will cause an economic boom. An alternative concept involves professional conscription to the army. The army should not be forced. To achieve it some funds should be devoted to increasing wages and improving the quality of life for military personnel."
 west_indies_federation_politics_events.615.a: "Pacifism"
 west_indies_federation_politics_events.615.b: "Soldiers attracted by better wages"
 west_indies_federation_politics_events.616.t: "Autonomic Economic Development"
 west_indies_federation_politics_events.616.d: "The Cayenne Agreement guaranteed increased autonomy of the post-French parts of the Federation. However, they were still crippled by the central government. There are voices that it would be worthwhile to bring economic decentralisation and give people tools that would allow independent development. This would result in weakening the central government, but it would be economically beneficial. Donald Sangster has drafted a plan. It considers sale of unprofitable companies owned by country, local vocational training plans, matching profitable enterprises to local needs and not promoting Canadian companies in West Indies."
 west_indies_federation_politics_events.616.a: "One step too far"
 west_indies_federation_politics_events.616.b: "It sounds great"
 west_indies_federation_politics_events.617.t: "Corruption Scandal"
 west_indies_federation_politics_events.617.d: "Some of our higher ranked politicians have been found out to be corrupt! As the papers are spreading the news, our standing in the eyes of the people has been tarnished."
 west_indies_federation_politics_events.617.a: "Damn them!"
 west_indies_federation_politics_events.618.t: "Mass Resignation"
 west_indies_federation_politics_events.618.d: "A wave of resignations has hit our most critical offices. This has severely reduced the efficiency of our institutions, and we can only speculate what caused it."
 west_indies_federation_politics_events.618.a: "Damn it!"
 west_indies_federation_politics_events.619.t: "Personal Conflicts between PA and LP"
 west_indies_federation_politics_events.619.d: "The LP is much more conservative compared to our faction of PA. Thanks to this, small conflicts about the future of our government continue to emerge. This time, however, there are no chances of mitigating the conflict."
 west_indies_federation_politics_events.619.a: "Our coalition stability is going to drop."
 west_indies_federation_politics_events.620.t: "Successful Coalition Discussions"
 west_indies_federation_politics_events.620.d: "The various party leaders have come to a conclusion on the future plans for the governing coalition. This will actually enable us to take good steps towards a better tomorrow, with the agreement of everyone."
 west_indies_federation_politics_events.620.a: "Great!"
 west_indies_federation_politics_events.621.t: "Coalition Turbulence with LP"
 west_indies_federation_politics_events.621.d: "Our coalition stability is going to drop. The LP is much more conservative compared to our faction of PA. Thanks to this, small conflicts about the future of our government continue to emerge. This time, however, there are no chances of mitigating the conflict."
 west_indies_federation_politics_events.621.a: "Let's hope it won't become worse."
 west_indies_federation_politics_events.622.t: "PA-LP Legislative Success"
 west_indies_federation_politics_events.622.d: "Despite the lack of a parliamentary majority, we managed to push through favourable changes. This is a great success of our party. Our coalition's stability is going to rise."
 west_indies_federation_politics_events.622.a: "Great!"
 west_indies_federation_politics_events.623.t: "Form Majority Coalition"
 west_indies_federation_politics_events.623.d: "We have finally managed to create a coalition with another party, and our new arrangements will help us govern more effectively, even if we had to compromise."
 west_indies_federation_politics_events.623.a: "Let our coalition with the Unity Party prove useful."
 west_indies_federation_politics_events.623.b: "Let our coalition with the NCP prove useful."
 west_indies_federation_politics_events.623.c: "Let our coalition with the radical PA prove useful."
 west_indies_federation_politics_events.625.t: "Penalty for Minority Government"
 west_indies_federation_politics_events.625.d: "Because of our refusal or inability to form a majority coalition, some new conflicts between LP and PA occur. It is going to hurt our coalition stability."
 west_indies_federation_politics_events.625.a: "The stability of our coalition is going to drop."
 west_indies_federation_politics_events.800.t: "Joining the Internationale"
 west_indies_federation_politics_events.800.d: "We have decided to join the Third Internationale. A delegate representing the West Indies Federation has been sent to Paris, where we will apply for membership."
 west_indies_federation_politics_events.800.a: "To Paris we go!"
 west_indies_federation_politics_events.801.t: "Elections Restarted"
 west_indies_federation_politics_events.801.d: "The socialist revolution has succeeded and the West Indies Union declared. Now that the rule of the socialism is safe within the West Indies, elections have restarted and the people have taken to the ballots. There are three major candidates -\n\nThe British Citizens' and Workers' Home Rule Party, more commonly known as the Butler Party (BP), under Tubal Uriah Butler and his clique, who aim for a higher position for trade unions in the West Indian Government. Butler's supporters are largely British socialists from Trinidad.\n\nThe People's Party (PP), under Aimé Fernand David Césaire, consisting of mainly French socialist youth who wish to see maximum autonomy for all provinces within the Union.\n\nThe Parti pour l'Autonomie (PA), now separated from the radical PNP after the revolution and led by Joseph Lagrosillière, aiming for a somewhat democratic system of political parties and consisting of mainly French citizens and Jamaican English politicians."
 west_indies_federation_politics_events.801.a: "The Parti pour I'Autonomie steals the polls!"
 west_indies_federation_politics_events.801.b: "The People's Party comes out on top!"
 west_indies_federation_politics_events.801.c: "The Butler Party wins in a landslide!"
 west_indies_federation_politics_events.802.t: "The PA's West Indian Union"
 west_indies_federation_politics_events.802.d: "Joseph Lagrosillière and the PA have come out of the elections victorious, and have assumed control of the government. Lagrosillière promises freedom for all, greater autonomy for the provinces, and democracy within the Union."
 west_indies_federation_politics_events.802.a: "We will see how his promises turn out..."
 west_indies_federation_politics_events.803.t: "Lagrosillière Announces New Education Programme"
 west_indies_federation_politics_events.803.d: "Joseph Lagrosillière has announced that the government will be supporting local public schools and funding a new socialist curriculum aimed at improving workers and the common folk, making them more useful at labour and training a new, young, generation to improve the status of the West Indies. Along with hiring new, more professional teachers, the entire curriculum is under rework, with many elective subjects being taken away and replaced with mandatory classes to reduce possible factor immobility."
 west_indies_federation_politics_events.803.a: "We will watch this with great interest..."
 west_indies_federation_politics_events.804.t: "Education Programme - Year 1 Report"
 west_indies_federation_politics_events.804.d: "The education programme has gone well so far, but there have been many setbacks. Children, especially those already enrolled in schools, are finding it increasingly hard to adjust to the new curriculum and many complaints have been raised, especially regarding student freedom in choosing classes. Teachers have complained about not receiving high-enough pay, something that the government should consider to fix."
 west_indies_federation_politics_events.804.a: "Interesting..."
 west_indies_federation_politics_events.805.t: "Education Programme - Year 2 Report"
 west_indies_federation_politics_events.805.d: "As a new wave of students roll in and workers have started to go to school again to get better educations, things are looking bright for the new education programme. Teachers no longer complain as much about the lack of pay, but some have raised questions about the efficiency of the new curriculum, especially in the new Mathematics and Science textbooks. Professionals are looking into the textbooks now to see if they can fix anything."
 west_indies_federation_politics_events.805.a: "Everything is going well!"
 west_indies_federation_politics_events.806.t: "Education Programme - Year 3 Report"
 west_indies_federation_politics_events.806.d: "It has been 3 years since the implementation of the new social democratic curriculum, and many have found it to be too politically charged. It seems as if too many students are becoming annoyed with constant references to the greatness of democracy and socialism, and would rather not see it in their textbooks. We have taken their complaints to heart and worked on de-politicising the curriculum."
 west_indies_federation_politics_events.806.a: "Seems like they didn't like politics much..."
 west_indies_federation_politics_events.807.t: "Education Programme - Year 10 Report"
 west_indies_federation_politics_events.807.d: "Students who entered school with our curriculum are now reaching the end, and are almost ready to graduate and go to college. However, students who entered the curriculum in their second year of school are finding it very hard to get high scores on the national exams and enter international colleges. It has been suggested that the curriculum be changed to be more intensive and college-preparatory."
 west_indies_federation_politics_events.807.a: "Understood."
 west_indies_federation_politics_events.808.t: "Education Programme - Year 20 Report"
 west_indies_federation_politics_events.808.d: "Twenty years have passed since Joseph Lagrosillière implemented the education reform. In those twenty years, West Indian workers have received much more education of a much higher quality. Our nation is now more advanced than ever, and technological research has speeded up. The West Indian Union now supplies great minds to across the world."
 west_indies_federation_politics_events.808.a: "Hurrah!"
 west_indies_federation_politics_events.809.t: "The Government Increases Welfare Spending"
 west_indies_federation_politics_events.809.d: "The government has increased their welfare spending, choosing to focus less on things like the military in favour of the social welfare of people. The more wealthy have been taxed more to bring the less fortunate up."
 west_indies_federation_politics_events.809.a: "To a more equal society!"
 west_indies_federation_politics_events.810.t: "The Housing for All Programme"
 west_indies_federation_politics_events.810.d: "The 'Housing for All' programme has been announced, which will see the use of unused land in the island of Jamaica and other, less inhabited islands for housing, with the aim to provide shelter for the homeless of the West Indies."
 west_indies_federation_politics_events.810.a: "An admirable effort!"
 west_indies_federation_politics_events.811.t: "Canada Responds"
 west_indies_federation_politics_events.811.d: "In response to the socialist takeover of the West Indies, the Dominion of Canada has declared war on the new West Indies Union as an attempt to reverse the Revolution and put a Governor-General back in charge of the West Indies. Their ships are ready and their guns are loaded, and we must be ready to fight back."
 west_indies_federation_politics_events.811.a: "Let's give them a fight they'll remember!"
 west_indies_federation_politics_events.812.t: "The West Indian Culture"
 west_indies_federation_politics_events.812.d: "Aimé Césaire has declared the West Indian Culture to be a united culture, uniting the myriad island cultures of British and French West Indians. He has promoted this new culture, claiming that it will usher the Union into a new age."
 west_indies_federation_politics_events.812.a: "We are one people, one nation!"
 west_indies_federation_politics_events.813.t: "A Victory for the People's Party"
 west_indies_federation_politics_events.813.d: "Aimé Césaire and his People's Party have won the elections, supported by West Indian socialist youth. Césaire promises autonomy for all, and his inauguration speech ended with much applause. It seems as if the West Indian populace approve of him greatly."
 west_indies_federation_politics_events.813.a: "Congratulations!"
 west_indies_federation_politics_events.814.t: "The Autonomous Provinces"
 west_indies_federation_politics_events.814.d: "President Césaire has decreed autonomy for the provinces, each with their own local governance. He is seeking a federal path, with the central government in Kingston becoming less dominant in the provinces. With this autonomy, however, Césaire has emphasised the idea of national unity, and the bonding together of West Indian people in the face of hardship and capitalism."
 west_indies_federation_politics_events.814.a: "Another step forwards for the Union!"
 west_indies_federation_politics_events.815.t: "A New Healthcare System"
 west_indies_federation_politics_events.815.d: "The President of the Union has implemented a new free healthcare system, with all citizens of the West Indies subject to the programme. He has taken inspiration from European models, but added the socialist element of healthcare for all."
 west_indies_federation_politics_events.815.a: "A great new system!"
 west_indies_federation_politics_events.816.t: "Opening of the West Indian Workers' Museum"
 west_indies_federation_politics_events.816.d: "The Workers' Museum has just been opened in Kingston, with an old colonial government building repurposed to house it. The exhibitions show the hardships of West Indian workers and unions in resisting colonial rule and the British. It houses, too, an exhibition about the history of the West Indies before the Europeans came, and an international exhibition showing off items from other countries in the Internationale."
 west_indies_federation_politics_events.816.a: "Glory to the Union!"
 west_indies_federation_politics_events.817.t: "A Call to Arms"
 west_indies_federation_politics_events.817.d: "'Brothers and sisters of the West Indies, we call upon your help today to fight against Canada and her Entente. We have, after decades of struggle, finally broken free, and liberation is near. But heed my words, fellow West Indian brethren - if Canada and her Empire manage to gain hold of the provinces once again, she will not be kind to our workers.'"
 west_indies_federation_politics_events.817.a: "To arms, comrades!"
 west_indies_federation_politics_events.818.t: "Canadian Ships near Montego Bay"
 west_indies_federation_politics_events.818.d: "Canadian ships have been spotted near Jamaica's Montego Bay, apparently haven taken a detour around Cuba and the Cayman Islands. They fired on us, but our men there stood bravely, however, and our defences held against the Canadian attack."
 west_indies_federation_politics_events.818.a: "They can't get us!"
 west_indies_federation_politics_events.819.t: "Discourse within the Union"
 west_indies_federation_politics_events.819.d: "Even though the war has brought the myriad socialist parties of the West Indies together, hot debates surrounding socialist thought have been going on recently. The Butler Party, Césaire's People's Party, and the Radical PA have all taken their thoughts and hotly debated them with the other parties."
 west_indies_federation_politics_events.819.a: "Political discourse is always healthy."
 west_indies_federation_politics_events.820.t: "Victory for the Butler Party"
 west_indies_federation_politics_events.820.d: "The British Citizens' and Workers' Home Rule Party, known more commonly as the Butler Party, has just won the West Indian elections. In a surprising turn of events, Tubal Uriah Butler and his clique have gained the support of the people and the following of thousands."
 west_indies_federation_politics_events.820.a: "A new syndicalist era dawns on the Caribbean!"
 west_indies_federation_politics_events.821.t: "The Elevation of Unions"
 west_indies_federation_politics_events.821.d: "President Butler seeks the elevation of the position of trade unions in the government. He has given up more and more of his power in favour of the unions, and has talked much about drastically improving workers' rights and equality within the workplace. He has also cut off working hours, a move celebrated by many."
 west_indies_federation_politics_events.821.a: "An admirable effort."
 west_indies_federation_politics_events.822.t: "Moving the Capital"
 west_indies_federation_politics_events.822.d: "Tubal Uriah Butler has raised the question of possibly changing the capital of the West Indies Union. As someone active mostly in Trinidad and Tobago, Butler has proposed that the government and the capital be moved to Port of Spain, where Butler holds more power."
 west_indies_federation_politics_events.822.a: "Move it, then."
 west_indies_federation_politics_events.822.b: "Kingston's fine."
 west_indies_federation_politics_events.823.t: "Spreading Socialism Across the Provinces"
 west_indies_federation_politics_events.823.d: "Tubal Uriah Butler has proposed a new way to spread socialism - through the unique cultures of the islands of the West Indies. He has encouraged political songs, and books centred on socialist thought have also been widely distributed across the islands."
 west_indies_federation_politics_events.823.a: "A good way to get the youth into syndicalism."
 west_indies_federation_politics_events.824.t: "The West Indies Union Requests Internationale Membership"
 west_indies_federation_politics_events.824.d: "A delegate from Kingston has just arrived at Paris, narrowly escaping Canadian ships while crossing the Atlantic. The West Indies Union has requested membership in the Third Internationale to help protect them against the Entente. They could be a valuable launching point for an invasion of Canada, but they also may be a burden for us. What do we choose?"
 west_indies_federation_politics_events.824.a: "Let them join!"
 west_indies_federation_politics_events.824.b: "We don't want to get involved in Caribbean squabbles..."
 west_indies_federation_politics_events.825.t: "France Accepts"
 west_indies_federation_politics_events.825.d: "The Commune of France has accepted our application to the Third Internationale, with our man being sent back to Kingston to tell us of this good news."
 west_indies_federation_politics_events.825.a: "To our socialist brethren!"
 west_indies_federation_politics_events.826.t: "France Declines"
 west_indies_federation_politics_events.826.d: "The Commune of France has sadly declined our request to join the Third Internationale. They have, however, sent our man back with some fine Parisian wine."
 west_indies_federation_politics_events.826.a: "Unfortunate, but at least we get some wine!"
 west_indies_federation_politics_events.827.t: "The Bahamas Defect"
 west_indies_federation_politics_events.827.d: "The Bahamas have just defected to Canada! Due to the large British influence in the Bahamas and the fear of socialism encroaching on the islands, they have decided to throw in their hat with Canada and work against the West Indies Union."
 west_indies_federation_politics_events.827.a: "Damn them..."
 west_indies_federation_politics_events.828.t: "Bermuda Defects"
 west_indies_federation_politics_events.828.d: "The island of Bermuda, long a stronghold of British rule, has defected to Canada! If only we had a garrison there, they could have been very beneficial to the Union as a launching point for an invasion of Canada..."
 west_indies_federation_politics_events.828.a: "A true shame!"
 west_indies_federation_politics_events.829.t: "Bahamian Resistance Crushed"
 west_indies_federation_politics_events.829.d: "The pro-Entente resistance within the Bahamas has been crushed! Our troops, garrisoned there, wiped out what little pro-Entente militant support was left. The Bahamas have stayed with the West Indies Union."
 west_indies_federation_politics_events.829.a: "They're on this ride now, whether they like it or not."
 west_indies_federation_politics_events.830.t: "Bermuda Holds"
 west_indies_federation_politics_events.830.d: "Even though the locals of Bermuda are very pro-Canada and anti-socialist, we have managed to put down their resistance to our rule through military might. The island is staying with us for good."
 west_indies_federation_politics_events.830.a: "The Bermudans cannot possibly resist us."
 west_indies_federation_politics_events.831.t: "The West Indies Have Begun Talks with the Internationale"
 west_indies_federation_politics_events.831.d: "For a few weeks we have been in conflict with syndicalist revolutionaries in the West Indies. Now, however, our loyalists in Kingston have informed us that the revolutionaries have begun talks with the Commune of France and the Union of Britain, with the possibility of joining their alliance. This presents us with a difficult situation - if we continue to prosecute this war, we will soon enter armed conflict with the syndicalists in the mainland, one we and/or our allies might not be ready to face. We have a few options: we can simply withdraw entirely from the region, effectively granting victory to the rebels and causing some loss of face, [WIF_event_keep_islands]or we could continue this war, with the possibility of escalation almost guaranteed. Is the Caribbean truly worth such trouble?"
 west_indies_federation_politics_events.831.a: "Withdraw from the Caribbean. They are not worth the risks."
 west_indies_federation_politics_events.831.b: "Withdraw, but keep a garrison on [WIF_event_islands]."
 west_indies_federation_politics_events.831.c: "We refuse to bow down to the rebels. The war will continue."
 west_indies_federation_politics_events.832.t: "The Canadians Withdraw from the Caribbean"
 west_indies_federation_politics_events.832.d: "Our talks with the Internationale have already paid off. We have received a notification from the Canadian government. Unwilling to risk a conflict with our comrades, they have ordered an end to all hostilities and the return of any of our territories, and their forces are already withdrawing from the Caribbean entirely. It seems our revolution was successful."
 west_indies_federation_politics_events.832.a: "Raise the scarlet standard high!"
 west_indies_federation_politics_events.833.t: "The Canadians Withdraw from the Caribbean"
 west_indies_federation_politics_events.833.d: "Our talks with the Internationale have already paid off. We have received a notification from the Canadian government. Unwilling to risk a conflict with our comrades, they have ordered an end to all hostilities, and their forces are already withdrawing from our lands. They have made clear, however, and in no uncertain terms, that [WIF_event_islands] are rightful Canadian territory, and are refusing to even consider the possibility of a peaceful return. It seems our revolution was partly successful."
 west_indies_federation_politics_events.833.a: "We don't have much of a choice, do we?"
 west_indies_federation_politics_events.833.b: "Unacceptable, our territory must be returned!"
 west_indies_federation_politics_events.834.t: "The West Indies Refuse our Withdrawal"
 west_indies_federation_politics_events.834.d: "The syndicalists in the West Indies have clearly gone mad. Our representative, who was supposed to notify them of our withdrawal, has returned empty-handed. The revolutionaries, it seems, will not accept our withdrawal unless we hand over [WIF_event_islands]. This is an utter insolence, of course, yet the risk of a war with the Internationale remains. By all accounts, [WIF_event_islands] are not worth fighting over, but our more conservative ministers are urging a hardline stance against the spread of syndicalism."
 west_indies_federation_politics_events.834.a: "This is not worth the trouble. Return [WIF_event_islands]."
 west_indies_federation_politics_events.834.b: "We shall punish this insolence!"
 west_indies_federation_politics_events.835.t: "The End of French Influence"
 west_indies_federation_politics_events.835.d: "The troublesome French islands are no long part of our nation. While some mourn the nation's territorial integrity, this has quickly brought a degree of political stability."
 west_indies_federation_politics_events.835.a: "Au Revoir."
 WIF_legalise_trade_unions: "Legalise Trade Unions"
 WIF_legalise_trade_unions_desc: "With the legal restrictions lifted in our prevision legislative revision, we can now finally de-facto legalise the Trade Unions in our territory and endorse their usage for the general populace."
 WIF_joseph_gothon_lunion: "Joseph Gothon-Lunion"
 WIF_joseph_gothon_lunion_desc: "§YBorn:§! §LMarch 10th, 1895, in Gossier, Colony of Guadeloupe, French Republic§!\n§YBackground:§! §LMost of the western world first learned Joseph Gothon-Lunion's name when a photograph was published in French and British magazines in 1927, showing him sitting crossed legged and grinning in the British Coronation Chair. This striking image of a black man seated atop a symbol of the British Empire was accompanied by declarations such as \"This picture should tell what will be the destiny of all exploiters\" and \"This will happen to all thrones\".\n\nYears before then, Joseph had his first brush with socialism through student circles at the University of the Antilles. As early as 1924 he made his way to Paris, prowling the bars and coffee clubs of the revolutionary capital's black political scene. By 1927, he toured both France and Britain as the self-proclaimed chief spokesman for the \"French Nègre\" cause. During this time Joseph built a reputation as a firebrand who rejected those Francophone blacks whom he viewed as too assimilated into the old colonial culture, particularly those who preferred the more tasteful label of \"Noir\" to describe themselves. At the same time, he also derided blacks born in Africa as lacking \"the prestige and education needed to lead\" what he envisioned to be the revolutionary vanguard of black liberation.\n\nThough he had been a founding member of the Ligue de défense de la race nègre (League for the Defence of the Negro Race), going as far as to describe it as the \"Black International\", Joseph drifted away from the organisation in the 1930s due to a long standing feud with many other of its leading voices. In its place, he attempted to build what he dubbed the Club des nègres conscients (Club of Conscious Negroes), a rival association that only ever encompassed his sycophants, both in Paris and Guadeloupe. His critics and political rivals derided him as an \"exalted man\" plagued by \"unstable ideas\". He eventually returned to Guadeloupe, securing re-entry to the colony by virtue of having married a white European woman whilst abroad, and maintained a low profile until the day that he could make his return to the political stage.§!"
 WIF_tubal_uriah_butler_army_chief_desc: "§YBorn:§! §LJanuary 21st, 1897, in St. George's, Grenada, British Windward Islands§!\n§YBackground:§! §LBeyond championing his enthusiastic political activism throughout the Caribbean, Butler also enjoys de-facto command over the socialist movement's more militant actions. His experience as a veteran of the Great War, serving with the West Indies Regiment in Egypt, as well as his many brawls and skirmishes with colonial authorities in Trinidad and Grenada hardened him as well as tough him the basics of strategy, tactics and warfare. Although Butler is more accustomed to the garrison duty he did in Egypt and rallying militias in the Trinidad oil fields, he's slowly but surely been able to adapt his military cunning to wage a larger scale of guerrilla warfare against the British and French overlords.§!\n\n§YNotes: Lacks a lot of knowledge about military strategy, but has the charisma and willpower to command his soldiers Has been battle hardened from his time in the Great War and fighting colonial troops in Trinidad, as such he's more than willing to go into battle alongside his men.§!"
 WIF_joseph_lagrosilliere_desc_body: "A very active French politician, Lagrosillière founded the Socialist Federation of Martinique (a branch of the SFIO on the island), and its newspaper Le Prolétaire.\n\nLagrosillière broke with the Parisian socialists in 1913, however, as they did not support the assimilation of colonies. Lagrosillière is a strong proponent of turning colonies into Departments, and the Federation of Martinique, without Lagrosillière, fell apart. It was revived in 1924 as the Second Federation. However, Lagrosillière continued his socialist advocacy in the Caribbean, continuing to become a politician in the West Indies Federation after the Weltkrieg.\n\nIn 1919, he made an electoral alliance with Fernand Clerc, a Béké industrialist on the island, which alienated him from his old socialist allies that criticised his 'alliance with capitalists'. He was arrested in 1925 for inciting trouble and violence, and again in 1931 for influence peddling."
 WIF_joseph_lagrosilliere_advisor_desc: "§YBorn:§! §LNovember 2nd, 1872, in Sainte-Marie, Martinique, French Republic§!\n§YBackground:§! §L$WIF_joseph_lagrosilliere_desc_body$§!"
